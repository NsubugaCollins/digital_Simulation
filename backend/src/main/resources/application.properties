# Server configuration
server.port=8081

# Database Configuration (PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/frexsos}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:frex_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:frex_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

# JWT Security Configurations
jwt.secret=${JWT_SECRET:407f349713b7d781577174e9e03d3bc01b7a69b76c8c6f1406bb1b43932bcf0a}
# Token valid for 24 hours (in milliseconds)
jwt.expiration=86400000

# CORS Allowed Origins
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.frexsos.backend=DEBUG

# Python simulation service URL and API key
simulation.service.url=${SIMULATION_SERVICE_URL:http://localhost:8000}
simulation.api.key=${SIMULATION_API_KEY:default-sim-api-key}
