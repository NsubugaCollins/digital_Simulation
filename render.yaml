services:
  - type: web
    name: frex-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: SPRING_DATASOURCE_HOST
        fromDatabase:
          name: frex-postgres
          property: host
      - key: SPRING_DATASOURCE_PORT
        fromDatabase:
          name: frex-postgres
          property: port
      - key: SPRING_DATASOURCE_DBNAME
        fromDatabase:
          name: frex-postgres
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: frex-postgres
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: frex-postgres
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: SIMULATION_SERVICE_URL
        value: http://frex-simulation:10000
      - key: SIMULATION_API_KEY
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://frex-frontend.onrender.com
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update

  - type: web
    name: frex-simulation
    runtime: docker
    dockerfilePath: ./simulation/Dockerfile
    dockerContext: ./simulation
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: SIMULATION_API_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://frex-frontend.onrender.com,https://frex-backend.onrender.com

  - type: web
    name: frex-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: VITE_API_BASE_URL
        value: https://frex-backend.onrender.com/api

databases:
  - name: frex-postgres
    databaseName: frexsos
    user: frex_user
    plan: free

