version: '3.9'

# ---------------------------------------------------------------------------
# FREX-SOS — Production Docker Compose
# ---------------------------------------------------------------------------
# Copy .env.example to .env and fill in real values before running.
# Start: docker compose up -d
# Logs:  docker compose logs -f
# ---------------------------------------------------------------------------

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: frex_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-frexsos}
      POSTGRES_USER: ${POSTGRES_USER:-frex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-frex} -d ${POSTGRES_DB:-frexsos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - frex_net

  # ── Python Simulation Engine ───────────────────────────────────────────────
  simulation:
    build:
      context: ./simulation
      dockerfile: Dockerfile
    container_name: frex_simulation
    restart: unless-stopped
    environment:
      SIMULATION_API_KEY: ${SIMULATION_API_KEY:?SIMULATION_API_KEY is required}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:80}
    volumes:
      # Persist trained model artefacts across restarts
      - simulation_models:/app/models
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - frex_net

  # ── Spring Boot Backend ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: frex_backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-frexsos}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-frex}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SIMULATION_SERVICE_URL: http://simulation:8000
      SIMULATION_API_KEY: ${SIMULATION_API_KEY:?SIMULATION_API_KEY is required}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:80}
    depends_on:
      db:
        condition: service_healthy
      simulation:
        condition: service_healthy
    expose:
      - "8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - frex_net

  # ── React Frontend (nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8081/api}
    container_name: frex_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - frex_net

  # ── Nginx Reverse Proxy (optional — routes /api → backend, / → frontend) ──
  # Uncomment to add a top-level proxy on port 443 with TLS termination.
  # proxy:
  #   image: nginx:1.27-alpine
  #   ports:
  #     - "443:443"
  #     - "80:80"
  #   volumes:
  #     - ./infra/nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
  #     - ./infra/certs:/etc/nginx/certs:ro
  #   depends_on: [frontend, backend]
  #   networks: [frex_net]

volumes:
  postgres_data:
  simulation_models:

networks:
  frex_net:
    driver: bridge
